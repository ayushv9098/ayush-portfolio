<svg width="512" height="512" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background with rounded corners -->
  <rect width="100" height="100" rx="22" fill="#0f0f14"/>
  <!-- Subtle border -->
  <rect x="1" y="1" width="98" height="98" rx="21" fill="none" stroke="#ffffff18" stroke-width="1.5"/>
  <!-- Subtle grid lines for techy feel -->
  <line x1="20" y1="10" x2="20" y2="90" stroke="#ffffff06" stroke-width="0.5"/>
  <line x1="50" y1="10" x2="50" y2="90" stroke="#ffffff06" stroke-width="0.5"/>
  <line x1="80" y1="10" x2="80" y2="90" stroke="#ffffff06" stroke-width="0.5"/>
  <line x1="10" y1="25" x2="90" y2="25" stroke="#ffffff06" stroke-width="0.5"/>
  <line x1="10" y1="50" x2="90" y2="50" stroke="#ffffff06" stroke-width="0.5"/>
  <line x1="10" y1="75" x2="90" y2="75" stroke="#ffffff06" stroke-width="0.5"/>
  <!-- A letterform - white, bold, primary -->
  <path d="M18 75 L38 25 L50 25 L62 75" fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="24" y1="57" x2="56" y2="57" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  <!-- V letterform - blue accent, secondary -->
  <path d="M58 25 L76 68 L94 25" fill="none" stroke="#a0c4ff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom accent dot -->
  <circle cx="50" cy="93" r="2.5" fill="#a0c4ff" opacity="0.6"/>
</svg>
